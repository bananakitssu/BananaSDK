plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    ndkVersion "25.2.9519653"

    defaultConfig {
        applicationId "com.bananasdk.app"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "0.1.0"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
